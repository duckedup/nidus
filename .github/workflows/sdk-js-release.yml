name: Release JS SDK

# Publishes @duckedup/nidus to npm whenever sdks/js/package.json's version bumps
# on main. Mirrors the crate's release.yml "bump-to-ship" gate, but keyed to the
# SDK's own version and a distinct tag namespace (js-v*) so it never collides with
# the crate's v* release tags.

on:
  push:
    branches: [main]
    paths:
      - "sdks/js/**"

permissions:
  contents: write
  id-token: write # required for npm provenance

jobs:
  check-version:
    name: Check for version bump
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./sdks/js/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=js-v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if tag exists
        id: check
        run: |
          TAG="js-v$(node -p "require('./sdks/js/package.json').version")"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG already exists, skipping release"
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG does not exist, will release"
          fi

  publish:
    name: Publish to npm
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/js
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install
        run: npm ci || npm install

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:unit

      - name: Build
        run: npm run build

      - name: Publish
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  github-release:
    name: Create GitHub Release
    needs: [check-version, publish]
    if: "!failure() && !cancelled() && needs.check-version.outputs.should_release == 'true'"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create tag
        run: |
          git tag ${{ needs.check-version.outputs.tag }}
          git push origin ${{ needs.check-version.outputs.tag }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PREV_TAG=$(git tag --sort=-v:refname --list 'js-v*' | grep -v "^${{ needs.check-version.outputs.tag }}$" | head -1)
          if [ -z "$PREV_TAG" ]; then
            NOTES=$(git log --pretty=format:"- %s" -- sdks/js | head -50)
          else
            NOTES=$(git log --pretty=format:"- %s" "$PREV_TAG"..HEAD -- sdks/js)
          fi

          gh release create "${{ needs.check-version.outputs.tag }}" \
            --title "JS SDK ${{ needs.check-version.outputs.version }}" \
            --notes "## @duckedup/nidus ${{ needs.check-version.outputs.version }}

          \`\`\`sh
          npm install @duckedup/nidus@${{ needs.check-version.outputs.version }}
          \`\`\`

          ### Changes

          $NOTES"
