name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  check-version:
    name: Check for version bump
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if tag exists
        id: check
        run: |
          TAG="v$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG already exists, skipping release"
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG does not exist, will release"
          fi

  # Build the `nidus` binary (the `serve` feature = `cli` + the full AI-ingest
  # layer) for each target and upload it as a release artifact. `serve` (not bare
  # `cli`) is what ships so `cargo binstall` / Docker users get the text-native
  # `/remember` + `/recall` endpoints out of the box. Asset names are
  # `nidus-<target>.tar.gz` (`.zip` on Windows), each holding the bare `nidus`
  # binary — matching `[package.metadata.binstall]` so `cargo binstall nidus`
  # resolves them. The library itself stays pure; only this opt-in feature pulls
  # the clap/tokio/axum + reqwest stack.
  build-binaries:
    name: Build ${{ matrix.target }}
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: true
          - target: aarch64-apple-darwin
            os: macos-latest
            use_cross: false
          - target: x86_64-apple-darwin
            os: macos-latest
            use_cross: false
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            use_cross: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # rust-toolchain.toml pins the channel, so the in-repo build uses that
      # toolchain — not the one dtolnay just set up. Add the cross target to the
      # *active* (pinned) toolchain so its std is present (e.g. x86_64-apple-darwin
      # std on an Apple-Silicon runner). `cross` provides std itself, so skip it.
      - name: Add target to the pinned toolchain
        if: "!matrix.use_cross"
        run: rustup target add ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build with cross
        if: matrix.use_cross
        run: cross build --release --features serve --target ${{ matrix.target }}

      - name: Build with cargo
        if: "!matrix.use_cross"
        run: cargo build --release --features serve --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../nidus-${{ matrix.target }}.tar.gz nidus
          cd ../../..
          # A sidecar checksum the installer verifies. `shasum` ships on both
          # macOS and Ubuntu runners.
          shasum -a 256 "nidus-${{ matrix.target }}.tar.gz" > "nidus-${{ matrix.target }}.tar.gz.sha256"

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/nidus.exe" -DestinationPath "nidus-${{ matrix.target }}.zip"
          $hash = (Get-FileHash -Algorithm SHA256 "nidus-${{ matrix.target }}.zip").Hash.ToLower()
          "$hash  nidus-${{ matrix.target }}.zip" | Out-File -Encoding ascii -NoNewline "nidus-${{ matrix.target }}.zip.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: binary-${{ matrix.target }}
          path: nidus-${{ matrix.target }}.*

  # The library is published to crates.io; the binaries above ride the GitHub
  # release. `cargo publish` verifies with default features, so it never compiles
  # the optional cli stack.
  publish-crate:
    name: Publish to crates.io
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-publish-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-publish-

      - name: Publish
        run: |
          OUTPUT=$(cargo publish 2>&1) && exit 0
          if echo "$OUTPUT" | grep -q "already exists"; then
            echo "Version already published to crates.io, skipping"
          else
            echo "$OUTPUT"
            exit 1
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  github-release:
    name: Create GitHub Release
    needs: [check-version, build-binaries, publish-crate]
    if: "!failure() && !cancelled() && needs.check-version.outputs.should_release == 'true'"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: binary-*
          merge-multiple: true

      - name: Create tag
        run: |
          git tag ${{ needs.check-version.outputs.tag }}
          git push origin ${{ needs.check-version.outputs.tag }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${{ needs.check-version.outputs.tag }}$" | head -1)
          if [ -z "$PREV_TAG" ]; then
            NOTES=$(git log --pretty=format:"- %s" HEAD)
          else
            NOTES=$(git log --pretty=format:"- %s" "$PREV_TAG"..HEAD)
          fi

          gh release create "${{ needs.check-version.outputs.tag }}" \
            nidus-*.tar.gz nidus-*.zip nidus-*.sha256 \
            --title "${{ needs.check-version.outputs.tag }}" \
            --latest \
            --notes "## nidus ${{ needs.check-version.outputs.version }}

          As a library:

          \`\`\`sh
          cargo add nidus@${{ needs.check-version.outputs.version }}
          \`\`\`

          As a CLI / server binary:

          \`\`\`sh
          cargo binstall nidus              # prebuilt binary (incl. memory endpoints)
          cargo install nidus --features serve   # from source (server + memory)
          \`\`\`

          ### Changes

          $NOTES"

  # The tag above is pushed with GITHUB_TOKEN, which cannot trigger the Docker
  # workflow on its own (the anti-recursion rule). So call it directly here, once a
  # release has actually been cut, to build and push the matching image.
  publish-docker:
    name: Publish Docker image
    needs: [check-version, github-release]
    if: "!failure() && !cancelled() && needs.check-version.outputs.should_release == 'true'"
    uses: ./.github/workflows/docker.yml
    with:
      version: ${{ needs.check-version.outputs.version }}
    secrets: inherit
