name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  # Incremental artifacts are large and single-run-only — they just bloat the
  # cache. CI builds clean each run, so disable incremental compilation.
  CARGO_INCREMENTAL: "0"

jobs:
  # Formatting is a no-compile check — keep it as its own fast job.
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  # clippy, test, and the release build are separate compiles (check-mode vs
  # build-mode artifacts vs the release profile), so run them as parallel jobs
  # instead of one sequential job. Each keeps its own cache slot. nidus is pure
  # Rust with a tiny dependency tree, so every one of these is a seconds-long build.
  #
  # The first three jobs build the pure library (default features) — the fast,
  # FFI-free core path. The `*-cli` jobs add `--features cli`, which pulls the
  # binary-only deps (clap + the tokio/axum stack) and compiles the `nidus`
  # binary + its server. Keeping them separate means a core-only change never
  # waits on the heavier cli compile, and the library's purity is checked on its
  # own. (Miri stays on the pure path below — it can't run the async server.)
  build:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: clippy
            components: clippy
            command: cargo clippy --all-targets -- -D warnings
          - name: test
            components: ""
            command: cargo test
          - name: release
            components: ""
            command: cargo build --release
          - name: clippy-cli
            components: clippy
            command: cargo clippy --all-targets --features cli -- -D warnings
          - name: test-cli
            components: ""
            command: cargo test --features cli
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: ${{ matrix.components }}

      # First-party cache with restore-keys. A Cargo.lock change misses the exact
      # key but falls back to the newest prior cache, so cargo reuses unchanged
      # deps and only the workspace crate recompiles. registry/src is omitted
      # (re-extracted from registry/cache) to keep the cache small.
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-${{ matrix.name }}-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.name }}-

      - run: ${{ matrix.command }}

  # The JS SDK (sdks/js) is independent of the Rust build: typecheck, unit tests
  # (mocked fetch — no server needed), and the bundle build. The integration test
  # against a real `nidus serve` runs locally via `just sdk-js-test-all`.
  sdk-js:
    name: JS SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: sdks/js/package-lock.json
      - run: npm install
        working-directory: sdks/js
      - run: npm run typecheck
        working-directory: sdks/js
      - run: npm run test:unit
        working-directory: sdks/js
      - run: npm run build
        working-directory: sdks/js

  miri:
    name: Miri
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Miri
        run: |
          rustup toolchain install nightly --component miri
          rustup override set nightly
          cargo miri setup

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-miri-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-miri-

      # nidus is pure safe Rust with zero FFI, so the whole suite runs under Miri
      # (no feature to gate out). File-backed tests that hit fsync/syscalls Miri
      # lacks carry `#[cfg_attr(miri, ignore)]`; everything else is checked.
      - name: Test with Miri
        env:
          MIRIFLAGS: "-Zmiri-disable-isolation -Zmiri-permissive-provenance -Zmiri-ignore-leaks"
        run: cargo miri test
