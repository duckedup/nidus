name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  # Incremental artifacts are large and single-run-only — they just bloat the
  # cache. CI builds clean each run, so disable incremental compilation.
  CARGO_INCREMENTAL: "0"

jobs:
  # Formatting is a no-compile check — keep it as its own fast job.
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  # clippy, test, and the release build are separate compiles (check-mode vs
  # build-mode artifacts vs the release profile), so run them as parallel jobs
  # instead of one sequential job. Each keeps its own cache slot. nidus is pure
  # Rust with a tiny dependency tree, so every one of these is a seconds-long build.
  #
  # The first three jobs build the pure library (default features) — the fast,
  # FFI-free core path. The `*-cli` jobs add `--features cli`, which pulls the
  # binary-only deps (clap + the tokio/axum stack) and compiles the `nidus`
  # binary + its lean (raw-endpoint-only) server. The `*-serve` jobs add
  # `--features serve` (the shipped binary: `cli` + the full ingest layer), which
  # compiles the text-native `/remember` + `/recall` routes and drives them
  # offline against in-process mocks. The `*-ingest` jobs add the off-by-default
  # AI ingest layer (`--features memory,embed-all,summarize-all`), which pulls the
  # async network edge (reqwest → hyper → rustls/ring). Keeping every non-core
  # feature set on its own lane means a core-only change never waits on a heavier
  # compile, and the library's purity is checked on its own. (Miri stays on the
  # pure path below — it can run neither the async server nor the async ingest edge.)
  build:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: clippy
            components: clippy
            command: cargo clippy --all-targets -- -D warnings
          - name: test
            components: ""
            command: cargo test
          - name: release
            components: ""
            command: cargo build --release
          - name: clippy-cli
            components: clippy
            command: cargo clippy --all-targets --features cli -- -D warnings
          - name: test-cli
            components: ""
            command: cargo test --features cli
          - name: clippy-serve
            components: clippy
            command: cargo clippy --all-targets --features serve -- -D warnings
          - name: test-serve
            components: ""
            command: cargo test --features serve
          - name: clippy-ingest
            components: clippy
            command: cargo clippy --all-targets --features memory,embed-all,summarize-all -- -D warnings
          - name: test-ingest
            components: ""
            command: cargo test --features memory,embed-all,summarize-all
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: ${{ matrix.components }}

      # First-party cache with restore-keys. A Cargo.lock change misses the exact
      # key but falls back to the newest prior cache, so cargo reuses unchanged
      # deps and only the workspace crate recompiles. registry/src is omitted
      # (re-extracted from registry/cache) to keep the cache small.
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-${{ matrix.name }}-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.name }}-

      - run: ${{ matrix.command }}

  # Build-thesis guard (epic nidus-54l): the off-by-default AI ingest layer must
  # not regress nidus's identity. This job asserts EMPIRICALLY, via the resolved
  # dependency graph, that:
  #   1. the DEFAULT build pulls NONE of reqwest / tokio / hyper (the async edge),
  #      so `cargo add nidus` stays the pure, seconds-fast, dep-lean sync store; and
  #   2. the ingest build's TLS is rustls + `ring` — the SAME small C+asm compile
  #      already present for ureq/redis — with NO aws-lc-sys and NO OpenSSL (the
  #      multi-minute C trees nidus exists to avoid).
  # It complements the compile-time `cfg` invariant in tests/build_thesis.rs
  # (built on the `test` and `test-ingest` lanes above). `-e no-dev` excludes
  # dev-dependencies so a test-only crate can never mask a real regression.
  build-thesis:
    name: build-thesis (dep-absence guard)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable

      - name: DEFAULT build pulls no async ingest edge
        run: |
          echo "::group::default dep tree (reqwest/tokio/hyper must be absent)"
          if cargo tree -e no-dev | grep -iE '(^|[^-])(reqwest|tokio|hyper)( |$|v)'; then
            echo "::error::default build pulled an AI-ingest async-edge crate (reqwest/tokio/hyper)"
            exit 1
          fi
          echo "default build is pure: no reqwest / tokio / hyper"
          echo "::endgroup::"

      - name: ingest build uses rustls/ring, never aws-lc/OpenSSL
        run: |
          echo "::group::ingest dep tree (must show rustls + ring, must NOT show aws-lc/openssl)"
          tree="$(cargo tree -e no-dev --features memory,embed-all,summarize-all)"
          echo "$tree" | grep -iE 'reqwest|rustls|ring' | sort -u
          if echo "$tree" | grep -iE 'aws-lc|openssl|native-tls'; then
            echo "::error::ingest build pulled a forbidden TLS backend (aws-lc / OpenSSL / native-tls)"
            exit 1
          fi
          echo "ingest TLS backend is rustls + ring only"
          echo "::endgroup::"

  # The JS SDK (sdks/js) is independent of the Rust build: typecheck, unit tests
  # (mocked fetch — no server needed), and the bundle build. The integration test
  # against a real `nidus serve` runs locally via `just sdk-js-test-all`.
  sdk-js:
    name: JS SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: sdks/js/package-lock.json
      - run: npm install
        working-directory: sdks/js
      - run: npm run typecheck
        working-directory: sdks/js
      - run: npm run test:unit
        working-directory: sdks/js
      - run: npm run build
        working-directory: sdks/js

  miri:
    name: Miri
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Miri
        run: |
          rustup toolchain install nightly --component miri
          rustup override set nightly
          cargo miri setup

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-miri-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-miri-

      # nidus is pure safe Rust with zero FFI, so the whole suite runs under Miri
      # (no feature to gate out). File-backed tests that hit fsync/syscalls Miri
      # lacks carry `#[cfg_attr(miri, ignore)]`; everything else is checked.
      - name: Test with Miri
        env:
          MIRIFLAGS: "-Zmiri-disable-isolation -Zmiri-permissive-provenance -Zmiri-ignore-leaks"
        run: cargo miri test
