name: Docker

# Publish the `nidus serve` image to Docker Hub. Fires when the release workflow
# pushes a `v<version>` tag (so the image version always matches a real release),
# and can be run by hand against any ref.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: Build and push image
    runs-on: ubuntu-latest
    # Skip cleanly on a fork / PR where the Docker Hub secrets aren't configured,
    # rather than failing the login step.
    if: ${{ github.repository == 'duckedup/nidus' }}
    steps:
      - uses: actions/checkout@v6

      # The image repo. Override with a `DOCKERHUB_IMAGE` repo variable (e.g. if the
      # Docker Hub namespace differs); defaults to the canonical name.
      - name: Resolve image name
        id: image
        run: echo "name=${DOCKERHUB_IMAGE:-duckedup/nidus}" >> "$GITHUB_OUTPUT"
        env:
          DOCKERHUB_IMAGE: ${{ vars.DOCKERHUB_IMAGE }}

      # Tags: the released version (1.2.3), the moving minor (1.2), and `latest`.
      # Derived from the git tag by metadata-action.
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # No QEMU: the Dockerfile cross-compiles on the native build platform and the
      # runtime stage only copies the binary in, so both arches build without emulation.
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
