name: Docker

# Build and push the `nidus serve` image to Docker Hub.
#
# NOT triggered by `push: tags`: the release workflow creates the `v<version>` tag
# with the default GITHUB_TOKEN, and GitHub deliberately does not start a new workflow
# run from a GITHUB_TOKEN-pushed tag (the anti-recursion rule). So `release.yml` calls
# this workflow directly (workflow_call) once it has cut a release. It can also be run
# by hand (workflow_dispatch) to (re)publish a specific version.
on:
  workflow_call:
    inputs:
      version:
        description: "Released version to tag the image with, e.g. 0.25.0 (no leading v)."
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: "Version to tag the image with. Defaults to Cargo.toml's version."
        required: false
        type: string

permissions:
  contents: read

jobs:
  publish:
    name: Build and push image
    runs-on: ubuntu-latest
    # Skip cleanly on a fork where the Docker Hub secrets aren't configured.
    if: ${{ github.repository == 'duckedup/nidus' }}
    steps:
      - uses: actions/checkout@v6

      # Resolve the version (call input wins; manual runs fall back to Cargo.toml),
      # its moving minor (1.2 from 1.2.3), and the image repo. Override the repo with a
      # `DOCKERHUB_IMAGE` variable (e.g. a different Docker Hub namespace).
      - name: Resolve version and image name
        id: vars
        run: |
          VERSION="${{ inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "minor=$(echo "$VERSION" | cut -d. -f1,2)" >> "$GITHUB_OUTPUT"
          echo "image=${DOCKERHUB_IMAGE:-duckedup/nidus}" >> "$GITHUB_OUTPUT"
        env:
          DOCKERHUB_IMAGE: ${{ vars.DOCKERHUB_IMAGE }}

      # Tags: the released version (1.2.3), the moving minor (1.2), and `latest`.
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.vars.outputs.image }}
          tags: |
            type=raw,value=${{ steps.vars.outputs.version }}
            type=raw,value=${{ steps.vars.outputs.minor }}
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # No QEMU: the Dockerfile cross-compiles on the native build platform and the
      # runtime stage only copies the binary in, so both arches build without emulation.
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
