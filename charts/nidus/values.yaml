# Default values for the nidus chart.
# See the chart README for a walkthrough; every nidus.* value maps to a NIDUS_*
# environment variable consumed by `nidus serve`.

# ── Image ─────────────────────────────────────────────────────────────────────
image:
  repository: duckedup/nidus
  # Tag defaults to the chart's appVersion when left empty.
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# ── nidus store configuration (→ NIDUS_* env) ──────────────────────────────────
# The image runs with NIDUS_REQUIRE_REMOTE=true: it refuses to start unless backed
# by a *shared, non-local* store. So `dim`, `persistence`, and `memory` are REQUIRED;
# the chart fails fast at render time if any is missing.
nidus:
  # Embedding dimension — pinned when the store is first created. REQUIRED.
  dim: 0

  # Durable bytes — an object store. REQUIRED.
  #   s3://<bucket>[/<prefix>]   or   gs://<bucket>[/<prefix>]
  persistence: ""

  # Shared in-RAM working set — a Redis-family tier. REQUIRED (set `memory` OR
  # `memorySecret`). Credentials go in the URL userinfo and TLS uses the rediss://
  # scheme: redis://host:6379, rediss://user:pass@host:6380 (also valkey://, keydb://,
  # dragonfly://). Append ?cluster=true for a Redis/Valkey Cluster — one seed host, or
  # several comma-separated (redis://a,b,c:6379?cluster=true); the rest of the topology is
  # discovered. When the URL carries a password, prefer `memorySecret` below so it never
  # lands in the Deployment manifest in plain text.
  memory: ""
  # Source the full NIDUS_MEMORY URL from a Secret instead of `memory` above. Use this
  # for an authenticated Redis so the password stays out of rendered manifests/values.
  memorySecret:
    name: ""
    key: NIDUS_MEMORY

  # Distance metric: "" (cosine, the default) | cosine | euclidean | dot.
  # Only honored when the store is first created.
  distance: ""

  # Max request/upsert body size in bytes. "" leaves the server default (256 MiB).
  maxBodyBytes: ""

  # Approximate-nearest-neighbour index: "" (exact brute force) | hnsw | ivf.
  ann: ""
  # Optional ANN tuning — each non-empty key becomes a NIDUS_ANN_* env var.
  # m, efConstruction, efSearch, nLists, nProbe, overscan, seed
  annParams: {}

# ── Bearer-token auth ───────────────────────────────────────────────────────────
# Strongly recommended whenever the Service is reachable beyond localhost. When
# enabled, every request except GET /health needs `Authorization: Bearer <token>`.
auth:
  enabled: false
  # Provide the token inline (stored in a chart-managed Secret)…
  token: ""
  # …or point at a key in a Secret you manage yourself (takes precedence).
  existingSecret: ""
  existingSecretKey: token

# ── Backend credentials (→ env) ─────────────────────────────────────────────────
# Two ways to authenticate:
#  (a) Keyless (recommended on EKS/GKE) — leave `credentials` empty and bind the
#      ServiceAccount to a cloud role via `serviceAccount.annotations`:
#        EKS/IRSA: eks.amazonaws.com/role-arn: arn:aws:iam::<acct>:role/<role>
#        GKE WI:   iam.gke.io/gcp-service-account: <sa>@<project>.iam.gserviceaccount.com
#      nidus picks up the injected web-identity token (S3) or metadata server (GCS) and
#      refreshes the temporary credentials automatically. ECS/EC2 instance roles also work.
#  (b) Static keys, supplied here:
#        S3 (s3://):  AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY (+ optional AWS_SESSION_TOKEN,
#                     AWS_REGION, AWS_ENDPOINT_URL for R2/MinIO).
#        GCS (gs://): a service-account key as GOOGLE_APPLICATION_CREDENTIALS_JSON (key JSON
#                     inline). Put it in an existing Secret and list it below.
credentials:
  # Inline key/value pairs are written to a chart-managed Secret and loaded via
  # envFrom. e.g.
  #   AWS_ACCESS_KEY_ID: "AKIA…"
  #   AWS_SECRET_ACCESS_KEY: "…"
  #   AWS_REGION: "us-east-1"
  #   AWS_ENDPOINT_URL: "http://minio:9000"   # for MinIO / non-AWS S3
  inline: {}
  # Existing Secrets to load wholesale via envFrom — the recommended path for real
  # secrets (SealedSecrets, External Secrets Operator, or a hand-made Secret). For GCS,
  # the Secret holds a GOOGLE_APPLICATION_CREDENTIALS_JSON key with the SA key JSON.
  existingSecrets: []

# Self-managed AWS web identity (IRSA-style) for S3 on clusters WITHOUT the EKS pod-identity
# webhook — e.g. self-hosted Kubernetes federated to AWS IAM through an OIDC provider. The
# chart projects a ServiceAccount token and points nidus at it (sets AWS_ROLE_ARN and
# AWS_WEB_IDENTITY_TOKEN_FILE), so S3 authenticates with no static keys. On EKS leave this
# disabled — the webhook injects the equivalent automatically from the SA annotation.
awsWebIdentity:
  enabled: false
  # The IAM role to assume (→ AWS_ROLE_ARN). Required when enabled.
  roleArn: ""
  # Projected-token audience; must match the audience configured on the IAM OIDC provider.
  audience: sts.amazonaws.com
  # Token lifetime before kubelet rotates the projected file (nidus re-reads it each refresh).
  expirationSeconds: 3600

# Escape hatches for anything not modeled above.
extraEnv: []
extraEnvFrom: []

# ── Workload ────────────────────────────────────────────────────────────────────
# `nidus serve` is a SINGLE writer: it holds an exclusive lock on the shared backend.
# Keep replicaCount at 1. With >1, the extra pods lose the lock race and crash-loop.
# Real multi-instance HA (cluster mode) is not yet exposed by the server.
replicaCount: 1

# Recreate (not RollingUpdate): the old writer must terminate — releasing its lock on
# SIGTERM — before the replacement starts, or the new pod hits a held-lock error.
updateStrategy:
  type: Recreate

# Give the writer time to flush and release its lock on SIGTERM before SIGKILL.
terminationGracePeriodSeconds: 30

resources: {}
  # limits:
  #   cpu: "2"
  #   memory: 2Gi
  # requests:
  #   cpu: 500m
  #   memory: 512Mi

# The image already runs as nonroot (uid 65532) and writes nothing to local disk.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# Probes hit the unauthenticated /health endpoint.
livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 2
  failureThreshold: 3
readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 3
  periodSeconds: 5
  timeoutSeconds: 2
  failureThreshold: 3

nodeSelector: {}
tolerations: []
affinity: {}
podAnnotations: {}
podLabels: {}

# ── Service ───────────────────────────────────────────────────────────────────
service:
  type: ClusterIP
  port: 7700
  annotations: {}

# ── Ingress ───────────────────────────────────────────────────────────────────
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: nidus.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

# ── ServiceAccount ──────────────────────────────────────────────────────────────
serviceAccount:
  create: true
  name: ""
  annotations: {}
